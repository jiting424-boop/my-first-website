<!DOCTYPE html>
<html>
<head>
<title>AI Career Guide Pro</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
margin:0;
}

section{
display:none;
padding:15px;
}

#home{display:block;}

.card{
background:white;
color:black;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
background:#ff7b00;
color:white;
border:none;
padding:10px;
border-radius:10px;
margin:5px;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#222;
padding:10px;
}

.nav button{
background:none;
color:white;
font-size:20px;
}

</style>

</head>

<body>

<!-- HOME -->
<section id="home">
<h2>🏠 AI Career Guide</h2>
<p>Welcome to your future 🚀</p>
</section>

<!-- LOGIN -->
<section id="login">
<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="userStatus"></p>
</section>

<!-- CAREER -->
<section id="career">
<h2>🎯 Career Explorer</h2>

<div id="careerList"></div>
<div id="careerDetail"></div>

</section>

<!-- ROADMAP -->
<section id="roadmap">
<h2>🛣️ AI Roadmap</h2>

<input type="text" id="careerInput" placeholder="Enter career">
<button onclick="generateRoadmap()">Generate</button>

<div id="roadmapResult"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>📊 Dashboard</h2>

<h3>Saved Careers ❤️</h3>
<div id="savedCareers"></div>

</section>

<!-- NAVIGATION -->
<div class="nav">

<button onclick="showSection('home')">🏠</button>
<button onclick="showSection('career')">🎯</button>
<button onclick="showSection('roadmap')">🛣️</button>
<button onclick="showSection('dashboard')">📊</button>
<button onclick="showSection('login')">👤</button>

</div>

<script>

// NAVIGATION
function showSection(section){

document.querySelectorAll("section").forEach(sec=>{
sec.style.display="none";
});

document.getElementById(section).style.display="block";

}

// LOGIN (Demo)
function signup(){
document.getElementById("userStatus").innerHTML="Signup Success ✅";
}

function login(){
document.getElementById("userStatus").innerHTML="Login Success 🎉";
}

// CAREER DATA
let careerData = [

{name:"AI Engineer",salary:"₹10-25 LPA",skills:"Python, ML",roadmap:"Python → ML → Projects"},
{name:"Doctor",salary:"₹6-20 LPA",skills:"Biology",roadmap:"PCB → NEET → MBBS"},
{name:"Software Engineer",salary:"₹5-15 LPA",skills:"Coding",roadmap:"Coding → Projects"},
{name:"Digital Marketer",salary:"₹3-10 LPA",skills:"SEO",roadmap:"Learn → Freelance"},
{name:"Graphic Designer",salary:"₹2-8 LPA",skills:"Design",roadmap:"Design → Portfolio"}

];

// SHOW CAREERS
function showCareers(){

let html="";

careerData.forEach((c,i)=>{
html += `<div class="card" onclick="showDetail(${i})">${c.name}</div>`;
});

document.getElementById("careerList").innerHTML = html;

}

// SHOW DETAIL
function showDetail(index){

let c = careerData[index];

document.getElementById("careerDetail").innerHTML = `
<div class="card">
<h3>${c.name}</h3>
<p>💰 Salary: ${c.salary}</p>
<p>🧠 Skills: ${c.skills}</p>
<p>🛣️ Roadmap: ${c.roadmap}</p>

<button onclick="saveCareer('${c.name}')">❤️ Save</button>

</div>
`;

}

// SAVE CAREER
function saveCareer(name){

let saved = JSON.parse(localStorage.getItem("careers")) || [];

if(!saved.includes(name)){
saved.push(name);
localStorage.setItem("careers", JSON.stringify(saved));
alert("Saved ✅");
}

loadSaved();

}

// LOAD DASHBOARD
function loadSaved(){

let saved = JSON.parse(localStorage.getItem("careers")) || [];

let html="";

saved.forEach(c=>{
html += `<div class="card">${c}</div>`;
});

document.getElementById("savedCareers").innerHTML = html;

}

// ROADMAP GENERATOR
function generateRoadmap(){

let career = document.getElementById("careerInput").value.toLowerCase();

let roadmap="";

if(career.includes("ai")){
roadmap="AI Roadmap: Python → ML → Projects → Job";
}
else if(career.includes("doctor")){
roadmap="Doctor: PCB → NEET → MBBS";
}
else{
roadmap="Try AI / Doctor / Software";
}

document.getElementById("roadmapResult").innerHTML=roadmap;

}

// INIT
showCareers();
loadSaved();

</script>

</body>
</html>
