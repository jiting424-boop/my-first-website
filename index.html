<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Guide PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#0a0a0a;color:white;padding:15px;display:flex;justify-content:space-between}
nav a{color:white;margin:10px;text-decoration:none}
section{padding:40px;text-align:center}
.hero{padding:80px;background:linear-gradient(90deg,#667eea,#764ba2);color:white}
.card{background:white;padding:20px;margin:10px;border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.1)}
input,select{padding:10px;margin:10px}
button{padding:10px 20px;border:none;background:black;color:white;border-radius:5px}
.dark{background:#111;color:white}
.dark .card{background:#222}
</style>

</head>
<body>

<header>
<h2>AI Career Guide PRO</h2>
<nav>
<a href="#">Home</a>
<a href="#careers">Careers</a>
<a href="#roadmap">Roadmap</a>
<a href="#chat">AI Chat</a>
<button onclick="darkMode()">🌙</button>
</nav>
</header>

<div class="hero">
<h1>India's #1 AI Career Platform</h1>
<p>200+ Careers | AI Roadmaps | Smart Guidance</p>
</div>

<section id="careers">
<h2>Career Database</h2>
<select id="careerSelect">
<option>Software Developer</option>
<option>AI Engineer</option>
<option>Doctor</option>
<option>Lawyer</option>
<option>Graphic Designer</option>
<option>Data Scientist</option>
</select>
<button onclick="careerInfo()">View Career</button>
<p id="careerOutput"></p>
</section>

<section id="roadmap">
<h2>AI Career Roadmap Generator</h2>
<select id="roadmapCareer">
<option>Software Developer</option>
<option>AI Engineer</option>
<option>Designer</option>
</select>
<button onclick="generateRoadmap()">Generate Roadmap</button>
<p id="roadmapOutput"></p>
</section>

<section>
<h2>Login / Signup</h2>
<input placeholder="Email">
<input placeholder="Password" type="password">
<button>Login</button>
</section>

<script>

async function chat(){

let question = document.getElementById("question").value;

document.getElementById("chatResult").innerHTML = "Loading...";

let response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a career guide AI."},
{role:"user",content:question}
]
})

});

let data = await response.json();

let answer = data.choices[0].message.content;

document.getElementById("chatResult").innerHTML = answer;

}

</script>
<section>
<h2>Resume Builder</h2>
<input id="name" placeholder="Name">
<input id="skills" placeholder="Skills">
<button onclick="resume()">Generate</button>
<p id="resumeOutput"></p>
</section>

<script>
function darkMode(){document.body.classList.toggle('dark')}

function careerInfo(){
document.getElementById('careerOutput').innerHTML='Career Info: High demand, good salary, strong growth.'
}

function generateRoadmap(){
document.getElementById('roadmapOutput').innerHTML='Step 1: Learn Basics → Step 2: Projects → Step 3: Job Apply'
}

function chat(){
document.getElementById('chatOutput').innerHTML='AI: Focus on skills + projects.'
}

function resume(){
let n=document.getElementById('name').value
let s=document.getElementById('skills').value

document.getElementById('resumeOutput').innerHTML='Name: '+n+' | Skills: '+s
}
</script>

</body>
</html>
