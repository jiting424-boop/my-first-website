<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>

const auth = firebase.auth();

function signup(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email, password)
.then(()=>{
document.getElementById("userStatus").innerHTML="Signup Success ✅";
})
.catch((error)=>{
document.getElementById("userStatus").innerHTML=error.message;
});

}

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, password)
.then(()=>{
document.getElementById("userStatus").innerHTML="Login Success 🎉";
})
.catch((error)=>{
document.getElementById("userStatus").innerHTML=error.message;
});

}

</script>
<script>

async function chat(){

let question = document.getElementById("question").value;

document.getElementById("chatResult").innerHTML = "Loading...";

let response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer your api key
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a career guide AI."},
{role:"user",content:question}
]
})

});

let data = await response.json();

let answer = data.choices[0].message.content;

document.getElementById("chatResult").innerHTML = answer;

}

</script>

<section>

<h2>Search Career</h2>

<input type="text" id="search" placeholder="Search career...">
<button onclick="searchCareer()">Search</button>

<div id="careerResult"></div>

</section>

<script>

let careers = [

"Software Engineer",
"Doctor",
"Data Scientist",
"AI Engineer",
"Web Developer",
"App Developer",
"Cyber Security Expert",
"Digital Marketer",
"Graphic Designer",
"UI/UX Designer",
"Chartered Accountant",
"Lawyer",
"Teacher",
"Pilot",
"Police Officer",
"Army Officer",
"Entrepreneur",
"YouTuber",
"Content Creator",
"Game Developer"

];

function searchCareer(){

let input = document.getElementById("search").value.toLowerCase();

let result = careers.filter(career => 
career.toLowerCase().includes(input)
);

document.getElementById("careerResult").innerHTML = result.join("<br>");

}

</script>

</section>
<script>

function generateRoadmap(){

let career = document.getElementById("careerInput").value.toLowerCase();

let roadmap = "";

if(career.includes("ai") || career.includes("data")){

roadmap = `
<h3>AI Engineer Roadmap 🚀</h3>
1️⃣ 12th PCM (Math important) <br>
2️⃣ B.Tech / BSc Computer Science <br>
3️⃣ Learn Python 🐍 <br>
4️⃣ Machine Learning + Deep Learning <br>
5️⃣ Projects (AI apps) <br>
6️⃣ Internship + Job
`;

}

else if(career.includes("doctor")){

roadmap = `
<h3>Doctor Roadmap 🏥</h3>
1️⃣ 12th PCB <br>
2️⃣ NEET Exam <br>
3️⃣ MBBS Degree <br>
4️⃣ Internship <br>
5️⃣ Specialization
`;

}

else if(career.includes("software")){

roadmap = `
<h3>Software Engineer 💻</h3>
1️⃣ 12th PCM <br>
2️⃣ B.Tech / Coding Skills <br>
3️⃣ Learn HTML, CSS, JS <br>
4️⃣ Build Projects <br>
5️⃣ Internship <br>
6️⃣ Job
`;

}

else{

roadmap = "⚠️ Career not found (try AI, Doctor, Software)";
}

document.getElementById("roadmapResult").innerHTML = roadmap;

}

</script>

<script>

let careerData = [

{
name:"AI Engineer",
salary:"₹10-25 LPA",
skills:"Python, Machine Learning, Deep Learning",
roadmap:"Learn Python → ML → Projects → Job"
},

{
name:"Doctor",
salary:"₹6-20 LPA",
skills:"Biology, Medical Knowledge",
roadmap:"12th PCB → NEET → MBBS → Internship"
},

{
name:"Software Engineer",
salary:"₹5-15 LPA",
skills:"Coding, DSA, Web Dev",
roadmap:"Learn Coding → Projects → Internship → Job"
}

];

function showCareers(){

let html = "";

careerData.forEach((career,index)=>{

html += `<div class="card" onclick="showDetail(${index})">
${career.name}
</div>`;

});

document.getElementById("careerList").innerHTML = html;

}

function showDetail(index){

let c = careerData[index];

document.getElementById("careerDetail").innerHTML = `
<div class="card">
<h3>${c.name}</h3>
<p>💰 Salary: ${c.salary}</p>
<p>🧠 Skills: ${c.skills}</p>
<p>🛣️ Roadmap: ${c.roadmap}</p>
</div>
`;

}

showCareers();

</script>
